services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VITE_APP_ENV: production
    ports:
      - "3200:80"
    depends_on:
      - api
    networks:
      - app-network

  api:
    build:
      context: ./mock-api
      dockerfile: Dockerfile
    ports:
      - "8282:8080"
    environment:
      - APP_ENV=production
      - FRED_API_KEY=${FRED_API_KEY:-}
      - ALPHA_VANTAGE_API_KEY=${ALPHA_VANTAGE_API_KEY:-}
    networks:
      - app-network

networks:
  app-network:
    driver: bridge
