services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VITE_APP_ENV: production
    ports:
      - "80:80"
    depends_on:
      - api
    networks:
      - app-network

  api:
    image: ${API_IMAGE:-econ-dashboard-api:latest}
    ports:
      - "8080:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=production
    networks:
      - app-network

networks:
  app-network:
    driver: bridge
