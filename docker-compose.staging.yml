services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VITE_APP_ENV: staging
    ports:
      - "3100:80"
    depends_on:
      - api
    networks:
      - app-network

  api:
    image: ${API_IMAGE:-econ-dashboard-api:latest}
    ports:
      - "8180:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=staging
    networks:
      - app-network

networks:
  app-network:
    driver: bridge
