services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VITE_APP_ENV: staging
    ports:
      - "3100:80"
    depends_on:
      - api
    networks:
      - app-network

  api:
    build:
      context: ./mock-api
      dockerfile: Dockerfile
    ports:
      - "8181:8080"
    environment:
      - APP_ENV=staging
    networks:
      - app-network

networks:
  app-network:
    driver: bridge
