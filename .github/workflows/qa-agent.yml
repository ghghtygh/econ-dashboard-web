name: QA Agent - 빌드/린트 검증

on:
  pull_request_review:
    types: [submitted]

jobs:
  qa:
    if: >
      github.event.review.state == 'approved' &&
      contains(github.event.pull_request.labels.*.name, 'auto-dev')
    runs-on: [self-hosted, econ-web]
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}

      - name: Node.js 설정
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 의존성 설치
        run: npm ci

      - name: 빌드 + 린트
        id: build
        run: |
          npm run lint 2>&1 | tee /tmp/lint-output.txt; LINT_EXIT=$?
          npm run build 2>&1 | tee /tmp/build-output.txt; BUILD_EXIT=$?
          echo "lint_exit=$LINT_EXIT" >> $GITHUB_OUTPUT
          echo "build_exit=$BUILD_EXIT" >> $GITHUB_OUTPUT
        continue-on-error: true

      - name: Claude Code로 QA 분석
        run: |
          PR_DIFF=$(gh pr diff ${{ github.event.pull_request.number }})
          LINT_LOG=$(cat /tmp/lint-output.txt)
          BUILD_LOG=$(cat /tmp/build-output.txt)

          QA_REPORT=$(claude -p "
          당신은 프론트엔드 QA 엔지니어입니다.
          빌드/린트 결과를 분석하고 QA 리포트를 작성하세요.

          ## 린트 결과 (exit: ${{ steps.build.outputs.lint_exit }})
          ${LINT_LOG}

          ## 빌드 결과 (exit: ${{ steps.build.outputs.build_exit }})
          ${BUILD_LOG}

          ## PR 변경사항
          ${PR_DIFF}

          ## 분석 항목
          1. 빌드 성공 여부
          2. 린트 에러/경고 분석
          3. TypeScript 타입 에러
          4. 누락된 import/export
          5. 통합 시 리스크

          ## 출력 형식
          최종 판정: ✅ MERGE_READY 또는 ❌ NOT_READY 를 명시하세요.
          " --allowedTools "Read,Glob,Grep")

          echo "$QA_REPORT" > /tmp/qa-report.txt

          if echo "$QA_REPORT" | grep -q "MERGE_READY"; then
            echo "QA_RESULT=pass" >> $GITHUB_ENV
          else
            echo "QA_RESULT=fail" >> $GITHUB_ENV
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: QA 리포트 코멘트
        run: |
          QA_BODY=$(cat /tmp/qa-report.txt)

          if [ "$QA_RESULT" = "pass" ]; then
            EMOJI="✅"
            STATUS="MERGE READY"
          else
            EMOJI="❌"
            STATUS="NOT READY"
          fi

          gh pr comment ${{ github.event.pull_request.number }} \
            --body "$(cat <<EOF
          ## ${EMOJI} QA Agent 리포트 - ${STATUS}

          ${QA_BODY}

          ---
          🤖 Generated by QA Agent (Claude Code)
          EOF
          )"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
