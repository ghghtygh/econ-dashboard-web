name: Dev Agent - 이슈 기반 코드 작성 + PR

on:
  issues:
    types: [labeled]

jobs:
  develop:
    if: github.event.label.name == 'auto-dev'
    runs-on: [self-hosted, econ-web]
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 이슈 정보 추출
        id: issue
        run: |
          echo "number=${{ github.event.issue.number }}" >> $GITHUB_OUTPUT
          echo "title=${{ github.event.issue.title }}" >> $GITHUB_OUTPUT

      - name: 브랜치 생성
        run: |
          BRANCH="feature/issue-${{ steps.issue.outputs.number }}"
          git checkout -b "$BRANCH"
          echo "BRANCH=$BRANCH" >> $GITHUB_ENV

      - name: Claude Code로 구현
        run: |
          ISSUE_BODY=$(gh issue view ${{ steps.issue.outputs.number }} --json body --jq '.body')

          claude -p "
          당신은 시니어 프론트엔드 개발자입니다.
          아래 GitHub 이슈를 구현해주세요.

          ## 이슈 #${{ steps.issue.outputs.number }}: ${{ steps.issue.outputs.title }}

          ${ISSUE_BODY}

          ## 규칙
          - React 19 + TypeScript + TailwindCSS 4 + Vite 프로젝트입니다
          - Zustand으로 상태 관리, React Query로 서버 상태 관리
          - Recharts로 차트 구현
          - 기존 코드 스타일을 따라주세요
          - 불필요한 파일은 만들지 마세요
          " --allowedTools "Read,Write,Edit,Glob,Grep,Bash"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: 변경사항 확인 및 PR 생성
        run: |
          if [ -z "$(git status --porcelain)" ]; then
            echo "변경사항 없음. 스킵합니다."
            exit 0
          fi

          git add -A
          git commit -m "feat: implement issue #${{ steps.issue.outputs.number }}

          ${{ steps.issue.outputs.title }}

          Closes #${{ steps.issue.outputs.number }}"

          git push origin "$BRANCH"

          gh pr create \
            --title "feat: ${{ steps.issue.outputs.title }}" \
            --body "$(cat <<EOF
          ## Summary
          이슈 #${{ steps.issue.outputs.number }} 구현

          ## Issue
          Closes #${{ steps.issue.outputs.number }}

          ## Changes
          $(git diff --stat HEAD~1)

          ---
          🤖 Generated by Dev Agent (Claude Code)
          EOF
          )" \
            --label "auto-dev"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
