name: Deploy Web

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  IMAGE_NAME: econ-web

jobs:
  build-and-deploy:
    runs-on: [self-hosted, econ-web]
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Node.js 설정
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 의존성 설치 및 빌드
        run: |
          npm ci
          npm run build
        env:
          VITE_API_BASE_URL: ${{ secrets.VITE_API_BASE_URL }}

      - name: Docker 이미지 빌드
        run: |
          docker build -t ${{ env.IMAGE_NAME }}:${{ github.sha }} .
          docker tag ${{ env.IMAGE_NAME }}:${{ github.sha }} ${{ env.IMAGE_NAME }}:latest

      - name: 기존 컨테이너 중지
        run: |
          docker stop econ-web || true
          docker rm econ-web || true

      - name: 컨테이너 실행
        run: |
          docker run -d \
            --name econ-web \
            --network econ-network \
            -p 80:80 \
            --restart unless-stopped \
            ${{ env.IMAGE_NAME }}:latest

      - name: 헬스체크
        run: |
          echo "Web 시작 대기 중..."
          for i in $(seq 1 15); do
            if curl -sf http://localhost:80 > /dev/null 2>&1; then
              echo "Web 정상 기동 확인"
              exit 0
            fi
            sleep 2
          done
          echo "헬스체크 실패"
          docker logs econ-web --tail 50
          exit 1

      - name: 배포 실패 시 롤백
        if: failure()
        run: |
          echo "배포 실패 - 이전 버전으로 롤백"
          docker stop econ-web || true
          docker rm econ-web || true
          PREV_IMAGE=$(docker images ${{ env.IMAGE_NAME }} --format '{{.Tag}}' | grep -v latest | head -1)
          if [ -n "$PREV_IMAGE" ]; then
            docker run -d \
              --name econ-web \
              --network econ-network \
              -p 80:80 \
              --restart unless-stopped \
              ${{ env.IMAGE_NAME }}:${PREV_IMAGE}
          fi
