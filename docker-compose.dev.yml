services:
  web:
    image: node:22-alpine
    working_dir: /app
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    volumes:
      - .:/app
      - /app/node_modules
    ports:
      - "4000:5173"
    environment:
      - VITE_APP_ENV=development
      - API_TARGET=http://api:8080
    depends_on:
      - api
    networks:
      - app-network

  api:
    build:
      context: ./mock-api
      dockerfile: Dockerfile
    ports:
      - "8083:8080"
    environment:
      - APP_ENV=development
      - FRED_API_KEY=${FRED_API_KEY:-}
      - ALPHA_VANTAGE_API_KEY=${ALPHA_VANTAGE_API_KEY:-}
    networks:
      - app-network

networks:
  app-network:
    driver: bridge
