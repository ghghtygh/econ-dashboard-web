services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:80"
    depends_on:
      - api
    volumes:
      - ./dist:/usr/share/nginx/html:ro
    networks:
      - app-network

  api:
    image: ${API_IMAGE:-econ-dashboard-api:latest}
    ports:
      - "8080:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=development
    networks:
      - app-network

networks:
  app-network:
    driver: bridge
